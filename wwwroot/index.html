<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dotnet Niger - Communauté .NET du Niger</title>
    <base href="/" />
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg" href="Logo.svg" />

    <link href="css/output.css" rel="stylesheet">

    <link href="lib/fontawesome/css/all.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="lib/tinymce/skins/ui/oxide/skin.min.css" />
    <link rel="stylesheet" href="lib/tinymce/skins/ui/oxide/content.min.css" />

    <meta property="og:title" content="Dotnet Niger" />
    <meta property="og:description" content="Communauté .NET du Niger" />
    <meta property="og:image" content="/images/og-default.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Dotnet Niger" />
    <meta property="og:locale" content="fr_FR" />
    <meta name="twitter:card" content="summary_large_image" />
</head>

<body>
    <div id="app" class="bg-[#F4F2F2] min-h-screen">
        <div class="flex justify-center items-center min-h-screen">
            <div class="flex flex-col items-center space-y-4">
                <div class="w-28 h-28 border-8 border-gray-300 border-t-secondary rounded-full animate-spin"></div>
            </div>
        </div>
        <div class="loading-progress-text"></div>
    </div>
    <div id="blazor-error-ui" class="bg-red-600 text-white px-4 py-2 rounded-md" style="display:none;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Charger TinyMCE depuis npm (mode hors ligne) -->
    <script src="lib/tinymce/tinymce.min.js"></script>
    <!-- Puis charger les fonctions d'initialisation -->
    <script src="tinymce-init.js"></script>
    <script src="lib/iconify/iconify-icon.min.js"></script>
    <!-- Chargement de Blazor -->
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="Script.js"></script>
</body>

</html>
