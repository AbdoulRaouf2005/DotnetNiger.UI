[build]
  publish = "bin/Release/net8.0/publish/wwwroot"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/_framework/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/lib/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/Images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.br"
  [headers.values]
    Content-Encoding = "br"

[[headers]]
  for = "*.dll.br"
  [headers.values]
    Content-Type = "application/octet-stream"

[[headers]]
  for = "*.wasm.br"
  [headers.values]
    Content-Type = "application/wasm"

[[headers]]
  for = "*.js.br"
  [headers.values]
    Content-Type = "text/javascript"

[[headers]]
  for = "*.css.br"
  [headers.values]
    Content-Type = "text/css"

[[headers]]
  for = "*.json.br"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "*.png.br"
  [headers.values]
    Content-Type = "image/png"

[[redirects]]
  from = "/_framework/*"
  to = "/_framework/:splat"
  status = 200

[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "/lib/*"
  to = "/lib/:splat"
  status = 200

[[redirects]]
  from = "/Images/*"
  to = "/Images/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
